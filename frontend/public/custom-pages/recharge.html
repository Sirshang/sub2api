<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>充值中心</title>
    <style>
      :root {
        --bg: #f4f7fb;
        --panel: #ffffff;
        --panel-muted: #f8fbff;
        --text: #0f172a;
        --subtle: #64748b;
        --line: #dbe7f5;
        --primary: #7c3aed;
        --primary-2: #22c55e;
        --primary-soft: #eef2ff;
        --dark: #0f172a;
        --shadow: 0 18px 48px rgba(15, 23, 42, 0.08);
        --radius-lg: 28px;
        --radius-md: 20px;
        --radius-sm: 14px;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC",
          "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
        background: linear-gradient(180deg, #f8fbff 0%, #f1f5f9 100%);
        color: var(--text);
      }

      .page {
        max-width: 1240px;
        margin: 24px auto;
        padding: 24px;
      }

      .shell {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: var(--radius-lg);
        box-shadow: var(--shadow);
        padding: 24px;
      }

      .hero {
        text-align: center;
        margin-bottom: 28px;
      }

      .hero h1 {
        margin: 0 0 8px;
        font-size: 42px;
        line-height: 1.2;
      }

      .hero p {
        margin: 0;
        color: var(--subtle);
        font-size: 15px;
      }

      .tabs {
        display: inline-flex;
        gap: 8px;
        background: #eef2f7;
        padding: 6px;
        border-radius: 999px;
        margin-top: 18px;
        flex-wrap: wrap;
        justify-content: center;
      }

      .tab {
        border: 0;
        border-radius: 999px;
        padding: 12px 22px;
        background: transparent;
        color: #475569;
        font-size: 14px;
        cursor: pointer;
      }

      .tab.active {
        background: linear-gradient(135deg, #7c3aed, #8b5cf6);
        color: #fff;
        box-shadow: 0 12px 24px rgba(124, 58, 237, 0.24);
      }

      .cards {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 20px;
      }

      .card {
        position: relative;
        background: #fff;
        border: 1px solid var(--line);
        border-radius: var(--radius-md);
        padding: 22px;
        min-height: 360px;
        display: flex;
        flex-direction: column;
      }

      .card.featured {
        background: linear-gradient(180deg, #eef5ff 0%, #ffffff 100%);
        border-color: #b8d5ff;
        box-shadow: 0 18px 36px rgba(59, 130, 246, 0.12);
      }

      .badge {
        position: absolute;
        right: 18px;
        top: 18px;
        border-radius: 999px;
        padding: 4px 10px;
        font-size: 12px;
        line-height: 1;
      }

      .badge.discount {
        background: #e7f9ee;
        color: #0f9f59;
      }

      .badge.featured {
        background: #0f172a;
        color: #fff;
      }

      .plan-title {
        font-size: 18px;
        font-weight: 700;
        margin-bottom: 14px;
      }

      .price-row {
        display: flex;
        align-items: baseline;
        gap: 10px;
        margin-bottom: 18px;
      }

      .price {
        font-size: 28px;
        font-weight: 800;
      }

      .old-price {
        color: #94a3b8;
        text-decoration: line-through;
        font-size: 16px;
      }

      .feature-list {
        list-style: none;
        padding: 0;
        margin: 0 0 22px;
        display: grid;
        gap: 12px;
      }

      .feature {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        color: #334155;
        font-size: 14px;
      }

      .feature-left {
        display: flex;
        align-items: center;
        gap: 10px;
      }

      .dot {
        width: 18px;
        height: 18px;
        border-radius: 999px;
        border: 1px solid currentColor;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        font-size: 11px;
        flex: 0 0 auto;
      }

      .pill {
        min-width: 52px;
        text-align: center;
        border-radius: 999px;
        padding: 5px 10px;
        font-size: 12px;
        line-height: 1;
      }

      .pill.green {
        background: #e7f9ee;
        color: #089455;
      }

      .pill.orange {
        background: #fff4e6;
        color: #f97316;
      }

      .pill.blue {
        background: #e8f3ff;
        color: #0b77e3;
      }

      .buy-btn {
        margin-top: auto;
        display: inline-flex;
        justify-content: center;
        align-items: center;
        width: 100%;
        border: 0;
        border-radius: 999px;
        padding: 14px 18px;
        font-size: 15px;
        font-weight: 700;
        background: #0f172a;
        color: #fff;
        text-decoration: none;
      }

      .buy-btn:hover {
        opacity: 0.92;
      }

      .section {
        margin-top: 24px;
        padding: 24px;
        border: 1px solid var(--line);
        border-radius: var(--radius-md);
        background: #fff;
      }

      .section h2 {
        margin: 0 0 16px;
        font-size: 24px;
      }

      .notes {
        list-style: none;
        padding: 0;
        margin: 0;
        display: grid;
        gap: 12px;
      }

      .notes li,
      .steps li {
        display: flex;
        gap: 10px;
        color: #334155;
        font-size: 14px;
        line-height: 1.7;
      }

      .steps-wrap {
        text-align: center;
      }

      .steps-title {
        margin: 34px 0 18px;
        font-size: 30px;
        font-weight: 800;
      }

      .steps {
        list-style: none;
        padding: 0;
        margin: 0;
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 16px;
      }

      .step-card {
        border: 1px solid var(--line);
        border-radius: var(--radius-md);
        padding: 22px 16px;
        background: #fff;
      }

      .step-icon {
        width: 46px;
        height: 46px;
        border-radius: 999px;
        margin: 0 auto 14px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 20px;
      }

      .step-tag {
        color: #94a3b8;
        font-size: 12px;
        letter-spacing: 0.16em;
        margin-bottom: 10px;
      }

      .step-name {
        font-size: 20px;
        font-weight: 800;
        margin-bottom: 8px;
      }

      .footer-help {
        margin-top: 16px;
        font-size: 14px;
        color: var(--subtle);
      }

      .footer-help a {
        color: #2563eb;
        text-decoration: none;
        font-weight: 600;
      }

      @media (max-width: 1100px) {
        .cards,
        .steps {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }
      }

      @media (max-width: 720px) {
        .page {
          padding: 14px;
          margin: 0;
        }

        .shell {
          padding: 18px;
          border-radius: 20px;
        }

        .hero h1 {
          font-size: 28px;
        }

        .cards,
        .steps {
          grid-template-columns: 1fr;
        }

        .section {
          padding: 18px;
        }
      }
    </style>
  </head>

      function renderCards(tabKey) {
        const current = pageConfig.tabs.find((tab) => tab.key === tabKey) || pageConfig.tabs[0];
        cardsEl.innerHTML = current.plans
          .map((plan) => {
            const badge = plan.badge
              ? `<span class="badge ${plan.badgeType}">${plan.badge}</span>`
              : "";

            const features = plan.features
              .map(([label, value, color]) => {
                const pill = value
                  ? `<span class="pill ${color}">${value}</span>`
                  : "";
                return `
                  <li class="feature">
                    <span class="feature-left">
                      <span class="dot" style="color:${color === "orange" ? "#f97316" : color === "blue" ? "#0b77e3" : color === "green" ? "#10b981" : "#94a3b8"}">•</span>
                      <span>${label}</span>
                    </span>
                    ${pill}
                  </li>
                `;
              })
              .join("");

            return `
              <section class="card ${plan.featured ? "featured" : ""}">
                ${badge}
                <div class="plan-title">${plan.title}</div>
                <div class="price-row">
                  <div class="price">${plan.price}</div>
                  ${plan.oldPrice ? `<div class="old-price">${plan.oldPrice}</div>` : ""}
                </div>
                <ul class="feature-list">${features}</ul>
                <a class="buy-btn" href="${plan.url}" target="_blank" rel="noreferrer">${plan.buttonText}</a>
              </section>
            `;
          })
          .join("");
      }

      function renderTabs() {
        tabsEl.innerHTML = pageConfig.tabs
          .map(
            (tab, index) => `
              <button class="tab ${index === 0 ? "active" : ""}" data-tab="${tab.key}">
                ${tab.label}
              </button>
            `
          )
          .join("");

        tabsEl.addEventListener("click", (event) => {
          const button = event.target.closest("[data-tab]");
          if (!button) return;
          const tabKey = button.getAttribute("data-tab");
          tabsEl.querySelectorAll(".tab").forEach((item) => item.classList.remove("active"));
          button.classList.add("active");
          renderCards(tabKey);
        });
      }
