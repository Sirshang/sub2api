name: sub2api-t2

# =============================================================================
# Sub2API t2.llmwc.com Isolated Instance
# =============================================================================
# This stack runs t2 as a separate instance of the same application:
# - separate app container
# - separate PostgreSQL container and data directory
# - separate Redis container and data directory
# - separate JWT/TOTP/admin account from the main domain
#
# Start:
#   docker compose --env-file .env.t2 -f docker-compose.t2.yml up -d
# Health:
#   curl -fsS http://127.0.0.1:${T2_SERVER_PORT:-18082}/health
# =============================================================================

services:
  sub2api-t2:
    image: ${SUB2API_IMAGE:-weishaw/sub2api:latest}
    container_name: sub2api-t2
    restart: unless-stopped
    ulimits:
      nofile:
        soft: 100000
        hard: 100000
    ports:
      - "${T2_BIND_HOST:-127.0.0.1}:${T2_SERVER_PORT:-18082}:8080"
    volumes:
      - ./t2/data:/app/data:Z
    environment:
      - AUTO_SETUP=true
      - SERVER_HOST=0.0.0.0
      - SERVER_PORT=8080
      - SERVER_MODE=${SERVER_MODE:-release}
      - SERVER_FRONTEND_URL=${SERVER_FRONTEND_URL:-https://t2.llmwc.com}
      - RUN_MODE=${RUN_MODE:-standard}

      - DATABASE_HOST=postgres-t2
      - DATABASE_PORT=5432
      - DATABASE_USER=${POSTGRES_USER:-sub2api_t2}
      - DATABASE_PASSWORD=${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      - DATABASE_DBNAME=${POSTGRES_DB:-sub2api_t2}
      - DATABASE_SSLMODE=disable
      - DATABASE_MAX_OPEN_CONNS=${DATABASE_MAX_OPEN_CONNS:-128}
      - DATABASE_MAX_IDLE_CONNS=${DATABASE_MAX_IDLE_CONNS:-64}
      - DATABASE_CONN_MAX_LIFETIME_MINUTES=${DATABASE_CONN_MAX_LIFETIME_MINUTES:-30}
      - DATABASE_CONN_MAX_IDLE_TIME_MINUTES=${DATABASE_CONN_MAX_IDLE_TIME_MINUTES:-5}

      - REDIS_HOST=redis-t2
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
      - REDIS_DB=${REDIS_DB:-0}
      - REDIS_POOL_SIZE=${REDIS_POOL_SIZE:-1024}
      - REDIS_MIN_IDLE_CONNS=${REDIS_MIN_IDLE_CONNS:-64}
      - REDIS_ENABLE_TLS=${REDIS_ENABLE_TLS:-false}

      - ADMIN_EMAIL=${ADMIN_EMAIL:-admin@t2.llmwc.com}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-}
      - JWT_SECRET=${JWT_SECRET:?JWT_SECRET is required}
      - JWT_EXPIRE_HOUR=${JWT_EXPIRE_HOUR:-24}
      - JWT_ACCESS_TOKEN_EXPIRE_MINUTES=${JWT_ACCESS_TOKEN_EXPIRE_MINUTES:-0}
      - TOTP_ENCRYPTION_KEY=${TOTP_ENCRYPTION_KEY:?TOTP_ENCRYPTION_KEY is required}
      - SETUP_MIGRATION_TIMEOUT_SECONDS=${SETUP_MIGRATION_TIMEOUT_SECONDS:-0}
      - TZ=${TZ:-Asia/Shanghai}

      - GEMINI_OAUTH_CLIENT_ID=${GEMINI_OAUTH_CLIENT_ID:-}
      - GEMINI_OAUTH_CLIENT_SECRET=${GEMINI_OAUTH_CLIENT_SECRET:-}
      - GEMINI_OAUTH_SCOPES=${GEMINI_OAUTH_SCOPES:-}
      - GEMINI_QUOTA_POLICY=${GEMINI_QUOTA_POLICY:-}
      - GEMINI_CLI_OAUTH_CLIENT_SECRET=${GEMINI_CLI_OAUTH_CLIENT_SECRET:-}
      - ANTIGRAVITY_OAUTH_CLIENT_SECRET=${ANTIGRAVITY_OAUTH_CLIENT_SECRET:-}
      - ANTIGRAVITY_USER_AGENT_VERSION=${ANTIGRAVITY_USER_AGENT_VERSION:-}
      - UPDATE_PROXY_URL=${UPDATE_PROXY_URL:-}
    depends_on:
      postgres-t2:
        condition: service_healthy
      redis-t2:
        condition: service_healthy
    networks:
      - sub2api-t2-network
    healthcheck:
      test: ["CMD", "wget", "-q", "-T", "5", "-O", "/dev/null", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  postgres-t2:
    image: docker.m.daocloud.io/library/postgres:18-alpine
    container_name: sub2api-postgres-t2
    restart: unless-stopped
    ulimits:
      nofile:
        soft: 100000
        hard: 100000
    volumes:
      - ./t2/postgres_data:/var/lib/postgresql/data:Z
    environment:
      - PGDATA=/var/lib/postgresql/data
      - POSTGRES_USER=${POSTGRES_USER:-sub2api_t2}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      - POSTGRES_DB=${POSTGRES_DB:-sub2api_t2}
      - TZ=${TZ:-Asia/Shanghai}
    networks:
      - sub2api-t2-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sub2api_t2} -d ${POSTGRES_DB:-sub2api_t2}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis-t2:
    image: docker.m.daocloud.io/library/redis:8-alpine
    container_name: sub2api-redis-t2
    restart: unless-stopped
    ulimits:
      nofile:
        soft: 100000
        hard: 100000
    volumes:
      - ./t2/redis_data:/data:Z
    command: >
      sh -c '
        exec redis-server
        --save 60 1
        --appendonly yes
        --appendfsync everysec
        $${REDIS_PASSWORD:+--requirepass "$$REDIS_PASSWORD"}'
    environment:
      - TZ=${TZ:-Asia/Shanghai}
      - REDIS_PASSWORD=${REDIS_PASSWORD:-}
      - REDISCLI_AUTH=${REDIS_PASSWORD:-}
    networks:
      - sub2api-t2-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

networks:
  sub2api-t2-network:
    driver: bridge
